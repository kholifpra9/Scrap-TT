<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - TikTok Scraper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Clash+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #ede8df;
    --card: #ffffff;
    --border: #d4cfc6;
    --ink: #1a1714;
    --ink2: #4a4540;
    --muted: #9a9590;
    --accent: #e85d2f;
    --accent2: #2f7de8;
    --green: #2db87a;
    --mono: 'DM Mono', monospace;
    --display: 'Clash Display', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--display);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    z-index: 10;
  }

  .card-title {
    font-size: 11px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    text-align: center;
    justify-content: center;
  }

  h1 { font-size: 28px; font-weight: 700; color: var(--ink); margin-bottom: 28px; text-align: center; line-height: 1.1; }
  h1 span { color: var(--accent); }

  .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }

  label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }

  input {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: var(--display);
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }

  .btn {
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 14px 22px;
    font-family: var(--display);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    margin-top: 8px;
  }
  .btn:hover:not(:disabled) { background: var(--accent); transform: translateY(-1px); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .err {
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    text-align: center;
    margin-top: 14px;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-title">Secured Access</div>
  <h1><span>Login</span> Required</h1>
  <form id="loginForm">
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" required />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" required />
    </div>
    <button type="submit" class="btn" id="btnSubmit">Login</button>
  </form>
  <div class="err" id="errMsg">Invalid credentials</div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btnSubmit');
  const err = document.getElementById('errMsg');
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Verifying...';
  err.style.display = 'none';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      window.location.href = '/';
    } else {
      err.textContent = data.error || 'Login failed';
      err.style.display = 'block';
    }
  } catch (error) {
    err.textContent = 'Network error. Please try again.';
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Login';
  }
});
</script>
</body>
</html>
